<div class="absolute left-0 right-0 top-1/2 h-[1px] bg-primary/10"></div>

<div class="absolute inset-0 radar-scan rounded-full"></div>

<div class="relative z-10 w-4 h-4 bg-primary rounded-full shadow-[0_0_15px_rgba(105,245,143,0.6)] animate-pulse"></div>
