<body class="bg-surface text-on-surface font-dm-sans selection:bg-primary selection:text-on-primary-container">

<div>

</div>

</div>

<div class="space-y-2">

</div>

<div class="flex-1 min-w-0">
<p class="text-[11px] font-bold truncate text-on-surface">CONVIDADO 1</p>
<p class="text-[9px] text-tertiary/70 uppercase font-medium">Convidado</p>
</div>
</div>
<!-- Open Slot -->
<div class="bg-surface-container-lowest border border-white/5 rounded-xl p-3 flex items-center gap-3 opacity-40">
<div class="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center text-white/20"><span class="material-symbols-outlined text-sm">add</span></div>
<p class="text-[9px] font-bold uppercase tracking-widest text-white/20">Vaga</p>
</div>
</div>
</div>
<!-- White Team -->
<div class="space-y-4">
<div class="flex items-center gap-2 mb-2">
<div class="w-1.5 h-6 bg-white/20 rounded-full"></div>
<h2 class="font-syne font-extrabold text-lg uppercase italic tracking-tighter">Time Branco</h2>
</div>
<div class="space-y-2">
<div class="bg-surface-container rounded-xl p-3 flex items-center gap-3 border border-white/5">
<div class="w-10 h-10 rounded-lg bg-white/10 flex items-center justify-center text-white font-bold text-sm">G</div>
<div class="flex-1 min-w-0">
<p class="text-[11px] font-bold truncate text-on-surface">FELIPE K.</p>
<p class="text-[9px] text-white/40 uppercase font-medium">Mensalista</p>
</div>
</div>
<div class="bg-surface-container rounded-xl p-3 flex items-center gap-3 border border-white/5">
<div class="w-10 h-10 rounded-lg bg-white/10 flex items-center justify-center text-white font-bold text-sm">M</div>
<div class="flex-1 min-w-0">
<p class="text-[11px] font-bold truncate text-on-surface">GABRIEL</p>
<p class="text-[9px] text-white/40 uppercase font-medium">Mensalista</p>

</div>
<div class="bg-surface-container rounded-xl p-3 flex items-center gap-3 border border-white/5">

<p class="text-[9px] font-bold uppercase tracking-widest text-white/20">Vaga</p>

<div class="absolute inset-0 bg-gradient-to-r from-surface via-surface/80 to-transparent"></div>
<div class="absolute inset-0 p-6 flex flex-col justify-center">
<span class="text-[9px] font-bold text-primary uppercase tracking-[0.2em] mb-1">Localização</span>
<h3 class="font-syne font-extrabold text-xl uppercase italic text-on-surface">Arena Central Society</h3>
<p class="text-xs text-white/60 mb-2">Rua das Olimpíadas, 450 • Itaim Bibi</p>
<div class="flex items-center gap-1.5 text-[10px] font-bold text-primary uppercase tracking-wider">
<span>Abrir no Maps</span>
<span class="material-symbols-outlined text-xs">open_in_new</span>

</div>
</button>
</section>

<footer class="fixed bottom-0 left-0 w-full p-6 pb-8 bg-gradient-to-t from-surface via-surface/90 to-transparent flex gap-3">
<button class="flex-1 h-14 bg-surface-container-highest/50 border border-white/10 rounded-2xl flex items-center justify-center gap-3 group active:scale-95 transition-all">
<span class="material-symbols-outlined text-white/60 group-hover:text-primary transition-colors">share</span>
<span class="text-white/80 font-bold text-sm uppercase tracking-widest">Compartilhar</span>
</button>
<button class="w-14 h-14 bg-surface-container-highest/50 border border-white/10 rounded-2xl flex items-center justify-center active:scale-95 transition-all">
