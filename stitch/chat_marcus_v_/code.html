<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chat Direto - PeladaApp</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&amp;family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">

        darkMode: "class",
        theme: {
          extend: {

              "on-error-container": "#ffd2c8",

              "secondary-dim": "#e79400",
              "primary-fixed-dim": "#5ae682",

              "on-background": "#f1fcf3",

              "primary-fixed": "#69f58f",
              "on-tertiary-fixed-variant": "#41208e",
              "tertiary-container": "#a589f8",
              "on-tertiary-fixed": "#1d0054",
              "tertiary-fixed": "#baa3ff",
              "tertiary-dim": "#a88cfb",
              "surface-container-high": "#16221b",
              "tertiary": "#b299ff",
              "outline": "#6d7870",
              "on-secondary": "#4a2c00",
              "surface-dim": "#07100b",
              "surface-bright": "#202f27",
              "on-primary-container": "#00290e",
              "on-error": "#450900",
              "on-secondary-container": "#fff6f0",
              "on-primary": "#005927",
              "on-secondary-fixed-variant": "#724700",
              "secondary-container": "#855300",
              "primary-dim": "#5ae682",
              "outline-variant": "#404a44",
              "primary-container": "#1cb85b",
              "error-dim": "#d53d18",
              "surface-container-lowest": "#000000",
              "tertiary-fixed-dim": "#ad92ff",
              "on-surface": "#f1fcf3",
              "error-container": "#b92902",
              "on-tertiary": "#31067e",
              "secondary-fixed": "#ffc885",
              "secondary": "#f8a010",
              "secondary-fixed-dim": "#ffb554",
              "surface-container-low": "#0b1610",
              "on-secondary-fixed": "#4c2e00",
              "on-primary-fixed": "#00441c",
              "surface-variant": "#1b2921",
              "on-surface-variant": "#a3aea5",
              "on-tertiary-container": "#230062",
              "on-primary-fixed-variant": "#00642d",
              "inverse-on-surface": "#4d5851",
              "surface-tint": "#69f58f",
              "surface-container": "#101c16",
              "inverse-primary": "#006e32",
              "surface-container-highest": "#1b2921"
            },
            fontFamily: {
              "headline": ["Syne"],
              "body": ["DM Sans"],
              "label": ["DM Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "12px", "2xl": "16px", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #07100B;
            background-image: 
                linear-gradient(rgba(28, 184, 91, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(28, 184, 91, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .message-glow-user {
            box-shadow: 0 4px 20px rgba(28, 184, 91, 0.15);
        }
        .glass-header {
            background: rgba(27, 41, 33, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full z-50 glass-header shadow-[0_32px_32px_rgba(0,0,0,0.4)]">
<div class="flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<div class="relative">
<img alt="Marcus V." class="w-10 h-10 rounded-full object-cover outline outline-2 outline-primary/20" data-alt="Professional portrait of a male soccer organizer" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB-oSMXEgUFWYTvgFZooLYj_w2FTvFW-boxWpOBJYl8SP8TkVqjXQGRzY4fUk6xTwXZSSAAjkdZWD6t0usqtZYuGXpoz_l4XZfcE_-i2k6Ml-Uly5v2__1GhPYrjgHAP6jBw1RUWdbTK2cJKWSw2kHhuuReHiJAM-Lhp8cPszTcQreu3J99K2s1Dr1i7F_GcA_VD7eG0B6dPNg5vNzRbgN_Ioc0r34r8qXjET397eqxkRQbYS4-XjlFqJAtfVunoZuyZbTF04XD-WN-"/>
<span class="absolute bottom-0 right-0 w-3 h-3 bg-primary rounded-full border-2 border-surface"></span>
</div>
<div class="flex flex-col">
<h1 class="font-headline font-extrabold tracking-tighter text-[#1CB85B] text-lg leading-tight">Marcus V.</h1>
<span class="text-[10px] uppercase tracking-widest text-primary font-bold">Online</span>
</div>
</div>
<div class="flex items-center gap-2">
<button class="p-2 rounded-xl text-[#1CB85B] hover:bg-[#1B2921] transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined">videocam</span>
</button>
<button class="p-2 rounded-xl text-[#404A44] hover:bg-[#1B2921] transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined">info</span>
</button>
</div>
</div>
</header>
<!-- Chat Canvas -->
<main class="flex-1 mt-16 mb-24 p-4 flex flex-col gap-6 max-w-2xl mx-auto w-full">
<!-- Date Indicator -->
<div class="flex justify-center my-4">
<span class="px-3 py-1 bg-surface-container rounded-full text-[10px] font-bold tracking-widest text-outline uppercase">Hoje</span>
</div>
<!-- Message: Marcus -->
<div class="flex flex-col items-start max-w-[85%] group">
<div class="bg-surface-container-highest text-[#E8F5EF] p-4 rounded-2xl rounded-tl-none shadow-sm transition-transform active:scale-[0.98]">
<p class="text-sm leading-relaxed">Opa, vi o convite! Onde vai ser exatamente?</p>
</div>
<span class="text-[10px] text-outline-variant mt-1 ml-1">14:22</span>
</div>
<!-- Message: User -->
<div class="flex flex-col items-end max-w-[85%] self-end group">
<div class="bg-primary-container text-on-primary-container p-4 rounded-2xl rounded-tr-none message-glow-user transition-transform active:scale-[0.98]">
<p class="text-sm font-medium leading-relaxed">Fala Marcus! Vai ser na Arena Itau, às 19h. Consegue vir?</p>
</div>
<div class="flex items-center gap-1 mt-1 mr-1">
<span class="text-[10px] text-outline-variant">14:25</span>
<span class="material-symbols-outlined text-[12px] text-primary" style="font-variation-settings: 'FILL' 1;">done_all</span>
</div>
</div>
<!-- Match Highlight Card (Bento Style) -->
<div class="w-full bg-surface-container rounded-2xl p-4 flex items-center gap-4 relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16 blur-3xl"></div>
<div class="w-12 h-12 bg-surface-container-highest rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-primary">stadium</span>
</div>
<div class="flex-1">
<h4 class="font-headline text-xs font-extrabold text-primary-dim tracking-tight">PRÓXIMA PELADA</h4>
<p class="text-sm font-bold text-on-surface">Arena Itaú • 19:00</p>
<p class="text-[11px] text-on-surface-variant">R. das Olimpíadas, 200 - SP</p>
</div>
<button class="bg-outline-variant/30 px-3 py-2 rounded-lg text-xs font-bold text-primary hover:bg-outline-variant/50 transition-all">
                Ver Mapa
            </button>
</div>
</main>
<!-- BottomNavBar / Input Shell -->
<footer class="fixed bottom-0 w-full z-50 bg-[#07100B] rounded-t-2xl">
<div class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-8 pt-4 gap-3 bg-[#0B1610]">
<button class="flex items-center justify-center text-[#404A44] p-3 hover:text-[#1CB85B] transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined">sentiment_satisfied</span>
</button>
<div class="flex-1 relative">
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-3 px-4 text-sm focus:ring-1.5 focus:ring-primary/40 placeholder:text-outline-variant text-on-surface" placeholder="Escreva uma mensagem..." type="text"/>
</div>
<button class="flex items-center justify-center text-[#404A44] p-3 hover:text-[#1CB85B] transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined">attach_file</span>
</button>
<button class="flex items-center justify-center text-[#404A44] p-3 hover:text-[#1CB85B] transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined">mic</span>
</button>
<button class="flex items-center justify-center bg-[#1CB85B] text-[#00290E] rounded-xl p-3 active:scale-90 transition-all duration-150 shadow-[0_8px_16px_rgba(28,184,91,0.2)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</footer>
</body></html>
